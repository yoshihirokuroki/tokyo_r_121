name: Render and Publish
on:
  push:
    branches: [ main ] # mainブランチにpushされたら実行

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # ここに環境変数を追加して警告に対応
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # R MarkdownやRコードを含む場合は、ここでRとパッケージのセットアップが必要
      - name: Install R
        uses: r-lib/actions/setup-r@v2
      - name: Install R Dependencies
        run: Rscript -e 'install.packages(c("plotly", "htmlwidgets", "DiagrammeR", "DiagrammeRsvg", "htmltools", "ggplot2", "ragg"))' # 必要なパッケージを列挙

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages # gh-pagesブランチにHTMLを出力して公開
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
